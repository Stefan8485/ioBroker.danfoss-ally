name: Test and Release

on:
  push:
    branches:
      - "*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------
  # 1) QUICK CHECK + LINT (ioBroker Standard)
  # ---------------------------------------------------
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    concurrency:
      group: check-and-lint-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: ioBroker/testing-action-check@v2.0.1
        with:
          node-version: '24.x'
          lint: true

  # ---------------------------------------------------
  # 2) FULL TEST MATRIX (Node 22/24 + Linux/Win/Mac)
  # ---------------------------------------------------
  adapter-tests:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    needs: check-and-lint
    concurrency:
      group: adapter-tests-${{ github.ref }}-${{ matrix.os }}-${{ matrix.node-version }}
      cancel-in-progress: true

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix['node-version'] }}
          os: ${{ matrix.os }}

  # ---------------------------------------------------
  # 3) DEPLOY — NPM Trusted Publishing + GitHub Release
  # ---------------------------------------------------
  deploy:
    needs: [check-and-lint, adapter-tests]

    # Trusted Publishing + Release creation needs these permissions
    permissions:
      contents: write
      id-token: write

    # Only release on tag push
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-deploy@v1.5.0
        with:
          node-version: '24.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
